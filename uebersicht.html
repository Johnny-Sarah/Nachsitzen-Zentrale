<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nachsitzenzentrale - Übersicht</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        tr:hover { background-color: #e8f4f8; }
        .checkbox-cell { text-align: center; }
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }
        .erledigt-row { opacity: 0.5; text-decoration: line-through; }
    </style>
</head>
<body>

<div class="container">
    <h1>Sieben Brücken Schule</h1>
    <h2 style="text-align: center; color: #7f8c8d;">Übersicht: Aufsicht Nachsitzen</h2>
    
    <table id="tabelle">
        <thead>
            <tr>
                <th>Schüler/in</th>
                <th>Veranlasst durch</th>
                <th>Grund</th>
                <th>Datum & Pause</th>
                <th>Dauer</th>
                <th>Aufgaben</th>
                <th>Status (Erledigt)</th>
            </tr>
        </thead>
        <tbody id="tabellenBody">
            </tbody>
    </table>
</div>

<script>
    function ladeDaten() {
        const eintraege = JSON.parse(localStorage.getItem('nachsitzenDaten')) || [];
        const tbody = document.getElementById('tabellenBody');
        tbody.innerHTML = ''; // Tabelle leeren

        if (eintraege.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Keine aktuellen Einträge vorhanden.</td></tr>';
            return;
        }

        eintraege.forEach((eintrag, index) => {
            const tr = document.createElement('tr');
            if (eintrag.erledigt) tr.classList.add('erledigt-row'); // Durchstreichen, wenn erledigt

            // Datum formatieren
            const datumObj = new Date(eintrag.datum);
            const datumFormatiert = datumObj.toLocaleDateString('de-DE');

            tr.innerHTML = `
                <td><strong>${eintrag.schueler}</strong></td>
                <td>${eintrag.lehrer}</td>
                <td>${eintrag.grund}</td>
                <td>${datumFormatiert}<br><small>(${eintrag.pause})</small></td>
                <td>${eintrag.dauer}</td>
                <td>${eintrag.aufgaben}</td>
                <td class="checkbox-cell">
                    <input type="checkbox" onchange="toggleErledigt(${index})" ${eintrag.erledigt ? 'checked' : ''}>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Funktion um den Status zu ändern und zu speichern
    function toggleErledigt(index) {
        let eintraege = JSON.parse(localStorage.getItem('nachsitzenDaten')) || [];
        eintraege[index].erledigt = !eintraege[index].erledigt; // Status umkehren
        localStorage.setItem('nachsitzenDaten', JSON.stringify(eintraege));
        ladeDaten(); // Tabelle neu laden
    }

    // Beim Laden der Seite die Daten anzeigen
    window.onload = ladeDaten;
</script>

</body>
</html>
